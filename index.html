<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Food Delivery Website</title>
  </head>
  <body>
    <!-- Header Part -->
    <header>
      <nav class="navbar flex between wrapper">
        <a href="#" class="logo">Foodie.</a>

        <!-- DESKTOP MENU -->
        <ul class="navlist flex gap-3">
          <li>
            <a href="#">Home</a>
          </li>

          <li>
            <a href="#">Menu</a>
          </li>

          <li>
            <a href="#">Services</a>
          </li>

          <li>
            <a href="#">About Us</a>
          </li>

          <li>
            <a href="#">Contacts</a>
          </li>
        </ul>

        <div class="desktop-action flex gap-2">
          <a href="#" class="cart-icon">
            <li class="fa-solid fa-bag-shopping"></li>
            <span class="cart-value">0</span>
          </a>

          <a href="#" class="btn">
            Sign in &nbsp;
            <i class="fa-solid fa-right-to-bracket"></i>
          </a>

          <a href="#" class="hamburger">
            <i class="fa-solid fa-bars"></i>
          </a>
        </div>

        <!-- MOBILE MENU -->
        <ul class="mobile-menu">
          <li>
            <a href="#">Home</a>
          </li>

          <li>
            <a href="#">Menu</a>
          </li>

          <li>
            <a href="#">Services</a>
          </li>

          <li>
            <a href="#">About Us</a>
          </li>

          <li>
            <a href="#">Contacts</a>
          </li>

          <a href="#" class="btn">
            Sign in &nbsp;
            <i class="fa-solid fa-right-to-bracket"></i>
          </a>
        </ul>
      </nav>
    </header>

    <!-- Sections part -->
    <main>
      <!-- 1. Hero section -->
      <section>
        <div class="hero-section flex wrapper gap-4">
          <div class="content">
            <h1>
              Enjoy Your Delicious
              <span>Food</span>
            </h1>
            <p class="para">
              We will fill your tummy with delicious <br />
              food with fast delivery.
            </p>
            <div class="flex gap-2">
              <a href="#" class="btn">Order Now</a>

              <a href="#" class="social-icons">
                <i class="fa-brands fa-x-twitter"></i>
              </a>

              <a href="#" class="social-icons">
                <i class="fa-brands fa-instagram"></i>
              </a>

              <a href="#" class="social-icons">
                <i class="fa-brands fa-facebook"></i>
              </a>

              <a href="#" class="social-icons">
                <i class="fa-brands fa-google-plus-g"></i>
              </a>
            </div>
          </div>

          <div class="image-container">
            <img src="./images/delivery-boy.png" />
          </div>
        </div>
      </section>
    </main>

    <!-- Footer part -->
    <footer></footer>

    <script src="./script.js"></script>
  </body>
</html>
